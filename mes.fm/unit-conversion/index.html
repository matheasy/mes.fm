<script>
document.addEventListener('DOMContentLoaded', function () {
    const inputLength1 = document.getElementById('inputLength1');
    const inputLengthUnit1 = document.getElementById('inputLengthUnit1');
    const outputLengthUnit1 = document.getElementById('outputLengthUnit1');
    const outputLength1 = document.getElementById('outputLength1'); // Updated to target the input element

    // Conversion factors relative to meter
    const conversionFactors = {
        meters: 1,
        centimeters: 0.01,
        millimeters: 0.001,
        feet: 0.3048,
        inches: 0.0254,
        yards: 0.9144,
        miles: 1609.34,
        kilometers: 1000,
    };

    function convertUnits() {
        const value = parseFloat(inputLength1.value);
        const inputConversionFactor = conversionFactors[inputLengthUnit1.value];
        const outputConversionFactor = conversionFactors[outputLengthUnit1.value];
        const resultInMeters = value * inputConversionFactor;
        const result = resultInMeters / outputConversionFactor;
        outputLength1.value = result.toFixed(3); // Update to set the value of the input field
    }

    function convertUnitsBackward() {
        const result = parseFloat(outputLength1.value);
        const outputConversionFactor = conversionFactors[outputLengthUnit1.value];
        const inputConversionFactor = conversionFactors[inputLengthUnit1.value];
        const inputInMeters = result * outputConversionFactor;
        const inputLength1Calc = inputInMeters / inputConversionFactor;
        inputLength1.value = inputLength1Calc.toFixed(3); // Update the input field based on the result
    }

    // Event listeners to update the conversion automatically
    inputLength1.addEventListener('input', convertUnits);
    inputLengthUnit1.addEventListener('change', convertUnits);
    outputLengthUnit1.addEventListener('change', convertUnits);
    outputLength1.addEventListener('input', convertUnitsBackward); // New event listener for the result input field

    // Initialize with default values
    convertUnits();
});
</script>
