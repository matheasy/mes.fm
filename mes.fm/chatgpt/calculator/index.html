<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES ChatGPT Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        header {
            background-color: #3498db;
            color: white;
            padding: 20px;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 80vh;
        }

        section {
            background-color: #f2f2f2;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        label, input {
            display: block;
            margin-bottom: 10px;
        }

        p#result {
            font-size: 24px;
            font-weight: bold;
        }

        /* Style for the "Remove Ads" button */
        #remove-ads-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }

        /* Style for the ad container */
        #ads-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>MES ChatGPT Calculator</h1>
    </header>

    <main>
        <section>
            <h2>Calculator</h2>
            <form>
                <label for="num1">Enter Number 1:</label>
                <input type="number" id="num1" name="num1" required oninput="calculateSum()">
                <br>
                <label for="num2">Enter Number 2:</label>
                <input type="number" id="num2" name="num2" required oninput="calculateSum()">
                <br>
                <p id="result">Sum: <span id="sumValue">0</span></p>
            </form>
        </section>

        <!-- "Remove Ads" button -->
        <button id="remove-ads-button" onclick="removeAds()">Remove Ads</button>

        <!-- Google AdSense Ad Code -->
        <div id="ads-container">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1461238060884369" crossorigin="anonymous"></script>
            <!-- MES ChatGPT Ad: Square -->
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1461238060884369"
                 data-ad-slot="4161942645"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </main>

    <script>
        function calculateSum() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const sum = num1 + num2;
            document.getElementById('sumValue').textContent = sum;
        }

        function removeAds() {
            const adsContainer = document.getElementById('ads-container');
            adsContainer.innerHTML = ''; // Remove the ad container contents
        }
    </script>
</body>
</html>
